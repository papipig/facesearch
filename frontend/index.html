<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XDD Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>XDDL Search</h1>
  <p class="subtitle">Face recognition search against a known individual</p>
</header>

<main>
  <div class="tabs">
    <button class="tab active" data-tab="single">Single Image</button>
    <button class="tab" data-tab="multiple">Multiple Images</button>
    <button class="tab" data-tab="url">URL</button>
  </div>

  <div class="tab-panel active" id="tab-single">
    <div class="drop-zone" id="drop-zone">
      <svg width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
      </svg>
      <p>Drop an image here or <label for="single-input" class="browse-link">browse</label></p>
      <input type="file" id="single-input" accept="image/*" hidden>
    </div>
    <div id="single-preview" class="file-preview"></div>
  </div>

  <div class="tab-panel" id="tab-multiple">
    <label class="file-label">
      <input type="file" id="multiple-input" accept="image/*" multiple>
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
      </svg>
      Choose images…
    </label>
    <div id="multiple-preview" class="file-preview"></div>
  </div>

  <div class="tab-panel" id="tab-url">
    <div class="url-input-row">
      <input type="url" id="url-input" placeholder="https://example.com/page-with-images">
    </div>
    <p class="hint">All images on the page will be scraped and searched.</p>
  </div>

  <button id="search-btn" class="search-button">Search</button>

  <section id="results-section" class="results-section hidden">
    <h2 id="results-heading">Results</h2>
    <div id="results-container"></div>
  </section>
</main>

<!-- Detail overlay (gallery click → single view with bounding boxes) -->
<div id="detail-overlay" class="detail-overlay hidden" role="dialog" aria-modal="true">
  <div class="detail-box">
    <button class="close-btn" id="close-detail" aria-label="Close">&times;</button>
    <div class="detail-image-wrapper">
      <img id="detail-img" src="" alt="">
      <canvas id="detail-canvas"></canvas>
    </div>
    <div id="detail-info" class="face-list"></div>
  </div>
</div>

<!-- Loading overlay -->
<div id="loading" class="loading hidden" aria-live="polite">
  <div class="spinner"></div>
  <p>Searching…</p>
</div>

<script src="app.js"></script>
</body>
</html>
