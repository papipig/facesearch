# Add these lines inside your existing certbot-managed <VirtualHost *:443> block.
# Run first:
#   sudo a2enmod proxy proxy_http headers auth_basic authn_file
#   sudo htpasswd -c /etc/apache2/.htpasswd yourusername   (repeat without -c to add more users)
#   sudo systemctl restart apache2

<VirtualHost *:443>
    ServerName yourdomain.com

    # --- paste your existing certbot SSL directives here ---

    # Basic authentication
    <Location />
        AuthType Basic
        AuthName "XDD Search"
        AuthUserFile /etc/apache2/.htpasswd
        Require valid-user
    </Location>

    # Reverse proxy to uvicorn
    ProxyPreserveHost On
    ProxyPass        / http://127.0.0.1:8000/
    ProxyPassReverse / http://127.0.0.1:8000/

    # Forward real client IP to the app
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-For   "%{REMOTE_ADDR}s"
</VirtualHost>
